<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus trabalhos - Joana Santos</title>
  <style>
    :root {
      --bg-start: #020617;
      --bg-end: #002b5b;
      --accent: #00c4ff;
      --accent-soft: #38bdf8;
      --text-main: #e5f4ff;
      --text-muted: #cbd5f5;
      --card-bg: rgba(8, 47, 73, 0.8);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top left, #0f172a 0, #020617 45%, #00111f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      width: 100%;
      max-width: 1100px;
      padding: 40px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-header a {
      font-size: 0.9rem;
      color: var(--accent-soft);
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.4);
      transition: background-color 0.18s ease, transform 0.18s ease;
    }

    .page-header a:hover {
      background-color: rgba(15, 23, 42, 0.9);
      transform: translateY(-1px);
    }

    h1 {
      font-size: clamp(1.8rem, 3vw, 2.2rem);
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--accent-soft);
      font-size: 0.95rem;
    }

    .works-section {
  margin-top: 72px;
}

.works-title {
  font-size: clamp(1.8rem, 2.4vw, 2.2rem);
  margin-bottom: 26px;
}

.works-card {
  position: relative;
  border-radius: 22px;
  background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), #020617 45%, #00111f 100%);
  border: 2px solid rgba(56, 189, 248, 0.5);
  padding: 28px 28px 26px;
  box-shadow: 0 24px 80px rgba(15, 23, 42, 0.95);
}

.works-main-image {
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid var(--accent-soft);
  max-width: 720px;
  margin: 0 auto 22px;
}

.works-main-image img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: cover;
}

/* Setas laterais */
.works-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: none;
  background: rgba(15, 23, 42, 0.88);
  color: var(--text-main);
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.9);
  transition: background-color 0.18s ease, transform 0.18s ease;
}

.works-arrow-left {
  left: 18px;
}

.works-arrow-right {
  right: 18px;
}

.works-arrow:hover {
  background: rgba(15, 23, 42, 0.98);
  transform: translateY(-50%) translateY(-1px);
}

/* Miniaturas */
.works-thumbs {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-top: 8px;
}

.thumb {
  border: 2px solid transparent;
  border-radius: 12px;
  overflow: hidden;
  padding: 0;
  background: transparent;
  cursor: pointer;
  transition: border-color 0.18s ease, transform 0.18s ease;
}

.thumb img {
  display: block;
  width: 100%;
  height: 80px;
  object-fit: cover;
}

.thumb:hover {
  transform: translateY(-1px);
  border-color: rgba(56, 189, 248, 0.6);
}

.thumb.is-active {
  border-color: var(--accent);
}

/* Responsivo */
@media (max-width: 768px) {
  .works-card {
    padding: 22px 18px 20px;
  }

  .works-arrow {
    width: 36px;
    height: 36px;
    font-size: 1.2rem;
  }

  .works-main-image {
    margin-bottom: 18px;
  }

  .thumb img {
    height: 64px;
  }
}
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <div>
        <h1>Meus trabalhos</h1>
        <p class="subtitle">Aqui vamos organizar os principais ensaios e projetos fotográficos.</p>
      </div>
      <a href="../index.html">← Voltar para a home</a>
    </header>

    <section class="works-section">
      <h2 class="works-title">Meus trabalhos</h2>
    
      <div class="works-card">
        <div class="works-main-image">
          <img src="../5268-IA-Para-Dev-Cursor-imagens/my_jobs_1.png" alt="Casal em casamento ao ar livre" />
        </div>
    
        <button class="works-arrow works-arrow-left" aria-label="Ver foto anterior">‹</button>
        <button class="works-arrow works-arrow-right" aria-label="Ver próxima foto">›</button>
    
        <div class="works-thumbs">
          <button class="thumb is-active">
            <img src="../5268-IA-Para-Dev-Cursor-imagens/my_jobs_1.png" alt="Casal se abraçando no casamento" />
          </button>
          <button class="thumb">
            <img src="../5268-IA-Para-Dev-Cursor-imagens/my_jobs_2.png" alt="Grupo de padrinhos comemorando" />
          </button>
          <button class="thumb">
            <img src="../5268-IA-Para-Dev-Cursor-imagens/my_jobs_3.png" alt="Família sorrindo em casa" />
          </button>
          <button class="thumb">
            <img src="../5268-IA-Para-Dev-Cursor-imagens/my_jobs_4.png" alt="Músico tocando violoncelo" />
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const mainImage = document.querySelector(".works-main-image img");
      const thumbButtons = Array.from(document.querySelectorAll(".works-thumbs .thumb"));
      const prevButton = document.querySelector(".works-arrow-left");
      const nextButton = document.querySelector(".works-arrow-right");

      if (!mainImage || !thumbButtons.length || !prevButton || !nextButton) return;

      let currentIndex = 0;

      function showImage(index) {
        const clampedIndex = (index + thumbButtons.length) % thumbButtons.length;
        const button = thumbButtons[clampedIndex];
        const img = button.querySelector("img");
        if (!img) return;

        mainImage.src = img.src;
        mainImage.alt = img.alt;

        thumbButtons.forEach((btn, i) => {
          if (i === clampedIndex) {
            btn.classList.add("is-active");
          } else {
            btn.classList.remove("is-active");
          }
        });

        currentIndex = clampedIndex;
      }

      thumbButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          showImage(index);
        });
      });

      prevButton.addEventListener("click", () => {
        showImage(currentIndex - 1);
      });

      nextButton.addEventListener("click", () => {
        showImage(currentIndex + 1);
      });

      // Sincroniza a imagem principal com a miniatura marcada inicialmente
      const initialActiveIndex = thumbButtons.findIndex((btn) =>
        btn.classList.contains("is-active")
      );

      if (initialActiveIndex >= 0) {
        showImage(initialActiveIndex);
      } else {
        showImage(0);
      }
    })();
  </script>
</body>
</html>
